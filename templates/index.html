<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="text-center mb-0">🏦 Loan Approval Prediction</h3>
                    </div>
                    <div class="card-body">
                        <form action="/predict" method="POST">
                            <div class="row">
                                <div class="col-md-6">
                                    <h5>Personal Information</h5>
                                    <div class="mb-3">
                                        <label class="form-label">Gender</label>
                                        <select class="form-control" name="gender" required>
                                            <option value="Male">Male</option>
                                            <option value="Female">Female</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Married</label>
                                        <select class="form-control" name="married" required>
                                            <option value="Yes">Yes</option>
                                            <option value="No">No</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Dependents</label>
                                        <select class="form-control" name="dependents" required>
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3+">3+</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Education</label>
                                        <select class="form-control" name="education" required>
                                            <option value="Graduate">Graduate</option>
                                            <option value="Not Graduate">Not Graduate</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Self Employed</label>
                                        <select class="form-control" name="self_employed" required>
                                            <option value="No">No</option>
                                            <option value="Yes">Yes</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <h5>Financial Information</h5>
                                    <div class="mb-3">
                                        <label class="form-label">Applicant Income</label>
                                        <input type="number" class="form-control" name="applicant_income" required min="0">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Co-applicant Income</label>
                                        <input type="number" class="form-control" name="coapplicant_income" required min="0">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Loan Amount</label>
                                        <input type="number" class="form-control" name="loan_amount" required min="1">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Loan Term (months)</label>
                                        <input type="number" class="form-control" name="loan_amount_term" required min="1">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Credit History</label>
                                        <select class="form-control" name="credit_history" required>
                                            <option value="1">Good</option>
                                            <option value="0">Bad</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Property Area</label>
                                        <select class="form-control" name="property_area" required>
                                            <option value="Urban">Urban</option>
                                            <option value="Semiurban">Semiurban</option>
                                            <option value="Rural">Rural</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="text-center mt-4">
                                <button type="submit" class="btn btn-primary btn-lg px-5">Predict Loan Status</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
